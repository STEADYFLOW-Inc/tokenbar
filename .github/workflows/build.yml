name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: powershell -File build.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TokenBar
          path: TokenBar.exe
