name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Read-only token: this workflow only builds and uploads an artifact.
permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build
        run: powershell -File build.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: TokenBar
          path: TokenBar.exe
