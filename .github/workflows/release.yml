name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: powershell -File build.ps1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudeTokenMeter.exe
